# Wallet Service — E2E test infrastructure (isolated from dev)
# Uses different project name, ports, and volumes to avoid conflicts.
# Dev:  PostgreSQL :5432, Redis :6379, App :3000
# Test: PostgreSQL :5433, Redis :6380, App :3333

name: wallet-test

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: wallet
      POSTGRES_DB: wallet_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet -d wallet_test"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    # No persistence — ephemeral test data
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3333:3000"
    environment:
      DATABASE_URL: postgresql://wallet:wallet@postgres:5432/wallet_test
      DIRECT_URL: postgresql://wallet:wallet@postgres:5432/wallet_test
      HTTP_PORT: "3000"
      LOG_LEVEL: silent
      CRON_SECRET: ""
      # TODO(historical-import-temp): Remove this env var together with the
      # rest of the import-historical-entry feature after migration.
      HISTORICAL_IMPORT_ENABLED: "true"
      # Distributed lock enabled for E2E to exercise the full pipeline
      WALLET_LOCK_ENABLED: "true"
      REDIS_URL: "redis://redis:6379"
      WALLET_LOCK_TTL_MS: "10000"
      WALLET_LOCK_WAIT_MS: "5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  postgres_test_data:
