name: Docs Freshness Check

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-freshness:
    name: Check stale documentation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find stale docs (>90 days without update)
        id: freshness
        run: |
          STALE_COUNT=0
          STALE_DOCS=""
          NINETY_DAYS_AGO=$(date -d "90 days ago" +%s 2>/dev/null || date -v-90d +%s)

          for doc in AGENTS.md README.md docs/*.md docs/architecture/*.md test/docs/*.md; do
            if [ -f "$doc" ]; then
              LAST_COMMIT=$(git log -1 --format="%ct" -- "$doc" 2>/dev/null || echo "0")
              LAST_DATE=$(git log -1 --format="%ci" -- "$doc" 2>/dev/null || echo "unknown")

              if [ "$LAST_COMMIT" -lt "$NINETY_DAYS_AGO" ] 2>/dev/null; then
                STALE_DOCS="$STALE_DOCS\n- **$doc** (last updated: $LAST_DATE)"
                STALE_COUNT=$((STALE_COUNT + 1))
              fi
            fi
          done

          echo "stale_count=$STALE_COUNT" >> $GITHUB_OUTPUT
          if [ $STALE_COUNT -gt 0 ]; then
            echo "stale_docs<<EOF" >> $GITHUB_OUTPUT
            echo -e "$STALE_DOCS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
          echo "Found $STALE_COUNT stale documents"

      - name: Create or update issue if stale docs found
        if: steps.freshness.outputs.stale_count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const staleDocs = `${{ steps.freshness.outputs.stale_docs }}`;
            const staleCount = ${{ steps.freshness.outputs.stale_count }};

            const title = `Docs freshness: ${staleCount} document(s) may be stale`;
            const body = `## Documentation Freshness Alert

            The following documents have not been updated in over 90 days:

            ${staleDocs}

            ### Action required

            For each stale document:
            1. Review against current code
            2. Update if content is outdated
            3. If still accurate, touch to reset the timer: \`git commit --allow-empty -m "docs: confirm freshness"\`
            `;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'docs-stale',
              state: 'open'
            });

            if (issues.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                title: title,
                body: body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['docs-stale', 'documentation']
              });
            }
