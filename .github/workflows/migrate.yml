name: Run Prisma Migrations

on:
  push:
    branches: [main]
    paths:
      - 'prisma/**'

  workflow_dispatch:

jobs:
  migrate:
    name: Prisma Migrate Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm prisma migrate deploy --config prisma/prisma.config.ts
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Apply database safety nets
        run: pnpm prisma db execute --file prisma/immutable_ledger.sql --config prisma/prisma.config.ts
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
