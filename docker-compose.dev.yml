# Wallet Service — Full local development (PostgreSQL + Redis + App with hot reload)
# Usage: pnpm dev:docker

name: wallet-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: wallet
      POSTGRES_DB: wallet
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet -d wallet"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory",
        "256mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
    environment:
      DATABASE_URL: postgresql://wallet:wallet@postgres:5432/wallet
      DIRECT_URL: postgresql://wallet:wallet@postgres:5432/wallet
      HTTP_PORT: "3000"
      LOG_LEVEL: debug
      CRON_SECRET: ""
      # TODO(historical-import-temp): Remove this env var together with the
      # rest of the import-historical-entry feature after migration.
      HISTORICAL_IMPORT_ENABLED: "true"
      # Distributed lock — uses the bundled Redis container
      WALLET_LOCK_ENABLED: "true"
      REDIS_URL: "redis://redis:6379"
      WALLET_LOCK_TTL_MS: "10000"
      WALLET_LOCK_WAIT_MS: "5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_dev_data:
  redis_dev_data:
